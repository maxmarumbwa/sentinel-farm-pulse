<!DOCTYPE html>
<html>
<head>
    <title>CHIRPS Rainfall Raster - Malawi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <h1>🌧️ CHIRPS Daily Rainfall Raster - Malawi (March 20, 2023)</h1>
    <div id="map" style="width: 100%; height: 600px;"></div>
    
    <script>
        var map = L.map('map').setView([-13.5, 34.0], 7);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
            attribution: '© CartoDB'
        }).addTo(map);
        
        {% if error %}
            document.write('<p style="color:red">Error: {{ error }}</p>');
        {% else %}
            // Add CHIRPS rainfall raster layer
            L.tileLayer('{{ tile_url|safe }}', {
                attribution: '© CHIRPS | Google Earth Engine',
                opacity: 0.8,
                maxZoom: 10
            }).addTo(map);
        {% endif %}
        
        // Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function(map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.style.background = 'white';
            div.style.padding = '10px';
            div.style.borderRadius = '5px';
            div.style.boxShadow = '0 0 5px rgba(0,0,0,0.2)';
            div.innerHTML = '<strong>Rainfall (mm)</strong><br>' +
                '<span style="background:#ffffcc;">&nbsp;&nbsp;&nbsp;</span> 0-10<br>' +
                '<span style="background:#a1dab4;">&nbsp;&nbsp;&nbsp;</span> 10-20<br>' +
                '<span style="background:#41b6c4;">&nbsp;&nbsp;&nbsp;</span> 20-30<br>' +
                '<span style="background:#2c7fb8;">&nbsp;&nbsp;&nbsp;</span> 30-40<br>' +
                '<span style="background:#253494;">&nbsp;&nbsp;&nbsp;</span> 40-60';
            return div;
        };
        legend.addTo(map);
        
        // Malawi boundary overlay
        var malawiBounds = [[-17.1, 32.7], [-9.4, 35.9]];
        L.rectangle(malawiBounds, {
            color: '#ff4444',
            weight: 2,
            fill: false
        }).addTo(map);
        
        var info = L.control({position: 'topright'});
        info.onAdd = function(map) {
            var div = L.DomUtil.create('div');
            div.innerHTML = '<b>📅 March 20, 2023</b><br>CHIRPS Daily Rainfall<br>Continuous Raster Data';
            div.style.background = 'white';
            div.style.padding = '8px 12px';
            div.style.borderRadius = '5px';
            div.style.boxShadow = '0 0 5px rgba(0,0,0,0.2)';
            return div;
        };
        info.addTo(map);
    </script>
</body>
</html>
